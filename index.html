<link rel="stylesheet" href="style.css">

<div class="top-banner-wrap">
  <img
    id="topBanner"
    class="top-banner-img"
    alt="Top banner"
    data-cell="./cell-phone-02.jpg"
    data-tablet="./banner-table-01.jpg"
    data-web="./web-banner-02.jpg"
    src="./web-banner-02.jpg"
  >
</div>

<div>
  CALL or TEXT: 213 725 1301
</div>
<script>
  (function () {
    const img = document.getElementById('topBanner');
    let current = '';

    function getKey() {
      const w = window.innerWidth || document.documentElement.clientWidth;
      if (w <= 599) return 'cell';
      if (w <= 1023) return 'tablet';
      return 'web';
    }

    function swapImage() {
      const key = getKey();
      if (key === current) return;

      current = key;
      const nextSrc = img.dataset[key];
      if (nextSrc && img.getAttribute('src') !== nextSrc) {
        img.setAttribute('src', nextSrc);
      }
    }

    swapImage();
    window.addEventListener('resize', swapImage);
    window.addEventListener('orientationchange', swapImage);
  })();
</script>
