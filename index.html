<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>CoolGuyWeb</title>
</head>

<body>

  <div class="top-banner-wrap">
    <img id="topBanner" class="top-banner-img" alt="Top banner" data-cell="./cell-phone-02.png"
      data-tablet="./banner-tablet-01.png" data-web="./web-banner-02.png" src="./web-banner-02.png">
  </div>

  <div class="phone-contact">
    CALL or TEXT: 213-725-1301
  </div>
  <script>
    (function () {
      const img = document.getElementById('topBanner');
      let current = '';

      function getKey() {
        const w = window.innerWidth || document.documentElement.clientWidth;
        if (w <= 599) return 'cell';
        if (w <= 1023) return 'tablet';
        return 'web';
      }

      function swapImage() {
        const key = getKey();
        if (key === current) return;

        current = key;
        const nextSrc = img.dataset[key];
        if (nextSrc && img.getAttribute('src') !== nextSrc) {
          img.setAttribute('src', nextSrc);
        }
      }

      swapImage();
      window.addEventListener('resize', swapImage);
      window.addEventListener('orientationchange', swapImage);
    })();
  </script>

</body>

</html>
